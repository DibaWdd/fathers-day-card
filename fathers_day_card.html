<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>روز پدر مبارک</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&family=Vazirmatn:wght@500;600;700&display=swap');

  :root {
    --sun: #FFB703;
    --coral: #FB5607;
    --pink: #FF6B9D;
    --sky: #3A86FF;
    --grass: #06D6A0;
    --cream: #FFF8EC;
    --ink: #3D2C1F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #FFF8EC 0%, #FFE8D1 100%);
    font-family: 'Vazirmatn', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Ambient floating shapes */
  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
  }
  .shape:nth-child(1) { width: 120px; height: 120px; background: var(--sky); top: 8%; left: 10%; animation-delay: 0s; }
  .shape:nth-child(2) { width: 80px; height: 80px; background: var(--coral); top: 70%; left: 15%; animation-delay: 1.5s; }
  .shape:nth-child(3) { width: 100px; height: 100px; background: var(--grass); top: 20%; right: 12%; animation-delay: 3s; }
  .shape:nth-child(4) { width: 60px; height: 60px; background: var(--pink); bottom: 10%; right: 18%; animation-delay: 2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-25px) scale(1.05); }
  }

  .stage {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
  }

  .prompt {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 600;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: var(--ink);
    margin-bottom: 28px;
  }

  .btn {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    color: white;
    background: linear-gradient(135deg, var(--coral), var(--pink));
    border: none;
    padding: 22px 48px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(251, 86, 7, 0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    letter-spacing: 0.3px;
  }

  .btn:hover {
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 14px 36px rgba(251, 86, 7, 0.45);
  }

  .btn:active {
    transform: translateY(-1px) scale(0.98);
  }

  .btn:focus-visible {
    outline: 3px solid var(--sky);
    outline-offset: 4px;
  }

  /* Card reveal */
  .card {
    display: none;
    background: white;
    border-radius: 28px;
    padding: 50px 40px;
    max-width: 480px;
    box-shadow: 0 25px 60px rgba(61, 44, 31, 0.18);
    animation: popIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.7) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card.show { display: block; }

  .sun-icon {
    font-size: 3.5rem;
    margin-bottom: 8px;
    display: inline-block;
    animation: spin-in 0.7s ease-out;
  }

  @keyframes spin-in {
    0% { transform: rotate(-30deg) scale(0); }
    100% { transform: rotate(0) scale(1); }
  }

  .headline {
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 2.6rem);
    background: linear-gradient(135deg, var(--coral), var(--pink), var(--sky));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 10px 0 18px;
    line-height: 1.15;
  }

  .message {
    font-size: 1.1rem;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .signature {
    font-family: 'Vazirmatn', sans-serif;
    font-size: 1rem;
    color: var(--sky);
    font-weight: 600;
    margin-top: 22px;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    opacity: 0.9;
    pointer-events: none;
    z-index: 10;
    border-radius: 2px;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0.3; }
  }

  @media (prefers-reduced-motion: reduce) {
    .shape, .btn, .card, .sun-icon, .confetti { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>

  <div class="stage">
    <div id="promptScreen">
      <p class="prompt">بابا یه چیزی برات فرستادم، بزن رو دکمه 👇</p>
      <button class="btn" id="openBtn" onclick="openCard()">بزن اینجا بابا</button>
    </div>

    <div class="card" id="card">
      <span class="sun-icon">🎉</span>
      <h1 class="headline">روز پدر مبارک</h1>
      <p class="message">
        امروز روز توئه. امیدوارم حالت خوب باشه.
      </p>
      <p class="message">
        ممنون بابت همه‌چیز.
      </p>
      <p class="signature">— از طرف دخترت، دانشجوی IT 💻</p>
    </div>
  </div>

<script>
  function openCard() {
    document.getElementById('promptScreen').style.display = 'none';
    document.getElementById('card').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#FFB703', '#FB5607', '#FF6B9D', '#3A86FF', '#06D6A0'];
    const count = 90;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const duration = 2.5 + Math.random() * 2;
      const delay = Math.random() * 0.6;
      piece.style.animation = `fall ${duration}s ease-in ${delay}s forwards`;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), (duration + delay) * 1000 + 200);
    }
  }
</script>

</body>
</html>
